<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | 3D Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="orb float-1"></div>
    <div class="orb float-2"></div>
    <div class="orb float-3"></div>

    <main class="scene">
        
        <section class="layer" data-aos="zoom-out-up">
            <div class="content-box hero-card">
                <img src="me.jpg" alt="Me" class="profile-pic">
                <h1>LEVEL <span class="accent">UP.</span></h1>
                <p class="subtitle">Web Developer & Student</p>
                <div class="btn-wrap">
                    <a href="https://www.google.com" target="_blank" class="btn-3d">EXPLORE</a>
                </div>
            </div>
        </section>

        <section class="layer grid">
            <div class="content-box card-3d" data-aos="fade-right">
                <p class="tag">01. PROCESS</p>
                <h3>Coding Journey</h3>
                <div class="img-frame">
                    <img src="me2.jpg" alt="Coding" class="display-img">
                </div>
            </div>
            <div class="content-box card-3d" data-aos="fade-left">
                <p class="tag">02. SPACE</p>
                <h3>Creative Setup</h3>
                <div class="img-frame">
                    <img src="me3.jpg" alt="Desk" class="display-img">
                </div>
            </div>
        </section>

        <section class="layer" data-aos="fade-up">
            <div class="content-box dark-card">
                <h2>BATTLE STATIONS</h2>
                <div class="game-pills">
                    <span class="pill">Rainbow Six Siege</span>
                    <span class="pill">War Thunder</span>
                    <span class="pill">GTA V</span>
                </div>
            </div>
        </section>

        <section class="layer" data-aos="flip-up">
            <div class="content-box activity-container">
                <h2>LIFESTYLE</h2>
                <div class="activity-grid">
                    <div class="act-card"><span>Fishing</span></div>
                    <div class="act-card"><span>Hockey</span></div>
                    <div class="act-card"><span>Travel</span></div>
                    <div class="act-card"><span>Cooking</span></div>
                </div>
            </div>
        </section>

        <footer class="layer" data-aos="zoom-in">
            <div class="footer-links">
                <a href="https://developer.mozilla.org" target="_blank">MDN</a>
                <a href="https://www.freecodecamp.org" target="_blank">FREECODECAMP</a>
            </div>
        </footer>

    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: false });
    </script>
</body>
</html>
